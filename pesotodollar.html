<!DOCTYPE html>

<head>

  <title>Dollar to Peso</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="hero">
    <h1>Dollar to Peso Converter</h1>

    <div class="top-links">

      <a href="monthly.html">Monthly</a>
