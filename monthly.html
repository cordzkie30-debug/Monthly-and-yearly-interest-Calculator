<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interest Calculators</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="hero">
    <h1 class="logo">Interest Calculators</h1>
    <p></p>

    <div class="calculators">
      <section class="form-card" id="yearly">
        <h2>Yearly Payment Calculator</h2>

        <label>Loan Amount / Principal (PHP)</label>
        <input type="number" id="yearlyPrincipal" placeholder="e.g. 100000" />

        <label>Annual Interest Rate (%)</label>
        <input type="number" id="yearlyRate" placeholder="e.g. 10" />

        <label>Years</label>
        <input type="number" id="yearlyYears" placeholder="e.g. 5" />

        <button onclick="calculateYearly()">Calculate Yearly Payment</button>
        <p id="yearlyResult" class="result">Results:</p>
      </section>

      <section class="form-card" id="monthly">
        <h2>Monthly Payment Calculator</h2>

        <label>Loan Amount / Principal (PHP)</label>
        <input type="number" id="monthlyPrincipal" placeholder="e.g. 100000" />

        <label>Annual Interest Rate (%)</label>
        <input type="number" id="monthlyRate" placeholder="e.g. 10" />

        <label>Months</label>
        <input type="number" id="monthlyMonths" placeholder="e.g. 24" />

        <button onclick="calculateMonthly()">Calculate Monthly Payment</button>
        <p id="monthlyResult" class="result">Results</p>
      </section>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
