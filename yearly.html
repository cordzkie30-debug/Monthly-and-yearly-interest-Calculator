<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yearly Calculator</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <main class="hero">
    <h1>Yearly Payment Calculator</h1>

    <div class="top-links">
      <a href="yearly.html">Yearly</a>
      <a href="monthly.html">Monthly</a>
      <a href="pesotodollor.html">Dollar to Peso</a>
    </div>

    <section class="form-card single-card">
      <label>Loan Amount / Principal (PHP)</label>
      <input type="number" id="yearlyPrincipal" placeholder="e.g. 100000" />

      <label>Annual Interest Rate (%)</label>
      <input type="number" id="yearlyRate" placeholder="e.g. 10" />

      <label>Years</label>
      <input type="number" id="yearlyYears" placeholder="e.g. 5" />

      <button onclick="calculateYearly()">Calculate Yearly Payment</button>
      <p id="yearlyResult" class="result">Results:</p>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
